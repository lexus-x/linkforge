version: '3.8'

services:
  linkforge:
    build: .
    container_name: linkforge
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - HOST=0.0.0.0
      - BASE_URL=http://localhost:8080
      - DB_PATH=/app/data/linkforge.db
      - RATE_LIMIT=100
      - RATE_WINDOW_SEC=60
    volumes:
      - linkforge-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  linkforge-data:
